name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --lib

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-tab-status
          path: target/release/zellij-tab-status

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: zellij-tab-status
          path: target/release/

      - name: Make binary executable
        run: chmod +x target/release/zellij-tab-status

      - name: Build test Docker image
        run: docker build -f Dockerfile.test -t zellij-tab-status-test .

      - name: Run integration tests
        run: |
          docker run --rm \
            -v "$(pwd)/target/release/zellij-tab-status:/test/zellij-tab-status:ro" \
            -v "$(pwd)/scripts:/test/scripts:ro" \
            zellij-tab-status-test \
            /test/scripts/docker-test-runner.sh
